update_plugins:
  name: Update Plugins
  description: >
    Triggers updates for the specified plugins (or all plugins with a pending
    update if no list is provided) on all configured Homebridge instances.
    Each plugin is updated individually via POST /api/plugins/update/{name}.
  fields:
    plugins:
      name: Plugins
      description: >
        Optional list of plugin names to update (e.g. homebridge-eveatmo).
        When omitted, every plugin that currently has a pending update is updated.
      required: false
      example: "homebridge-eveatmo"
      selector:
        text:
          multiple: true

update_homebridge_core:
  name: Update Homebridge Core
  description: >
    Triggers an update of the Homebridge core package (homebridge) on all
    configured Homebridge instances via POST /api/plugins/update/homebridge.

update_homebridge_ui:
  name: Update Homebridge UI
  description: >
    Triggers an update of the Homebridge Config UI X package
    (homebridge-config-ui-x) on all configured Homebridge instances via
    POST /api/plugins/update/homebridge-config-ui-x.
