update_plugins:
  name: Update Plugins
  description: >
    Triggers updates for all plugins that currently have a pending update on
    all configured Homebridge instances. Each plugin is updated individually
    via POST /api/plugins/update/{name} and the results are logged.

update_homebridge_core:
  name: Update Homebridge Core
  description: >
    Triggers an update of the Homebridge core package (homebridge) on all
    configured Homebridge instances via POST /api/plugins/update/homebridge.

update_homebridge_ui:
  name: Update Homebridge UI
  description: >
    Triggers an update of the Homebridge Config UI X package
    (homebridge-config-ui-x) on all configured Homebridge instances via
    POST /api/plugins/update/homebridge-config-ui-x.
